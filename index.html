<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#317EFB">
  <meta charset="UTF-8">
  <title>体重管理アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    background: #f5f5f5;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
    padding: 15px;
  }

  h1, h2 {
    margin-top: 20px;
  }

  input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
    box-sizing: border-box;
  }

  button {
    background: #317EFB;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  ul {
    padding: 0;
    margin: 0;
  }

  li {
    list-style: none;
    margin: 5px 0;
    padding: 10px;
    background: white;
    border-radius: 5px;
  }

  /* 折りたたみ */
  .accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    margin-top: 20px;
  }

  .accordion-header h2 {
    margin: 0;
  }

  .accordion-arrow {
    font-size: 18px;
    transition: transform 0.2s;
    color: #317EFB;
  }

  .accordion-arrow.open {
    transform: rotate(180deg);
  }

  .accordion-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .accordion-body.open {
    max-height: 2000px;
  }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">

    <h1>体重記録</h1>

    <input type="datetime-local" id="datetime">
    <input type="number" id="weight" placeholder="体重(kg)">
    <button onclick="saveData()">保存</button>

    <h2>グラフ</h2>
    <div style="height:300px;">
      <canvas id="chart"></canvas>
    </div>

    <div class="accordion-header" onclick="toggleAccordion()">
      <h2>記録一覧</h2>
      <span class="accordion-arrow" id="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body" id="accordion-body">
      <ul id="list"></ul>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
